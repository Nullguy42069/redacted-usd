<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Redacted Multisig</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      width: 280px;
      font: 13px/1.4 -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background: #0B0B12;
      color: #EDEDF2;
    }
    header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #1F1F2A;
      display: flex; align-items: center; gap: 10px;
    }
    .logo {
      width: 28px; height: 28px; border-radius: 6px;
      background: linear-gradient(135deg, #6D228F 0%, #22D3EE 100%);
      display: grid; place-items: center;
      color: white; font-weight: 800;
    }
    h1 { margin: 0; font-size: 14px; font-weight: 600; }
    .sub { color: #8B8B9A; font-size: 11px; }
    section { padding: 12px 16px; }
    .label { color: #8B8B9A; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
    .vault {
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 12px;
      word-break: break-all;
      color: #EDEDF2;
      background: #14141E;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #1F1F2A;
    }
    .vault.empty { color: #8B8B9A; font-style: italic; font-family: inherit; }
    button {
      width: 100%;
      background: linear-gradient(90deg, #7C3AED 0%, #22D3EE 100%);
      color: white;
      border: 0;
      padding: 8px 12px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover { filter: brightness(1.08); }
    .row { display: flex; gap: 8px; margin-top: 10px; }
    .row button.secondary {
      background: #14141E; color: #EDEDF2; border: 1px solid #1F1F2A; font-weight: 500;
    }
    footer { padding: 10px 16px; border-top: 1px solid #1F1F2A; color: #8B8B9A; font-size: 11px; }
  </style>
</head>
<body>
  <header>
    <div class="logo">R</div>
    <div>
      <h1>Redacted Multisig</h1>
      <div class="sub">Connected dApps route here</div>
    </div>
  </header>
  <section>
    <div class="label">Active vault</div>
    <div id="vault" class="vault empty">No vault selected — open Redacted and pick one.</div>
    <div class="row">
      <button id="open">Open Redacted</button>
    </div>
  </section>
  <footer>v<span id="ver">0.0.0</span> · stays out of your way once a vault is set</footer>
  <script src="popup.js"></script>
</body>
</html>
