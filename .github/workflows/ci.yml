name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.4.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Fee-integrity invariant: fee wallet pinned + caps not raised.
      - name: Fee integrity
        run: pnpm check:fees

      # Type safety is the real gate (next build ignores TS errors by config).
      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      # Fail the build on a high/critical advisory in the dependency tree.
      - name: Dependency audit
        run: pnpm audit --audit-level high
